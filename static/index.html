<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimulCast — AI 同声传译助手</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="app">

    <!-- ═══ 顶部控制栏 ═══ -->
    <div class="topbar">
        <div class="topbar-left">
            <span class="brand-dot" id="brand-dot"></span>
            <span class="brand-name">SimulCast</span>
            <span class="brand-badge">AI 同声传译</span>
        </div>
        <div class="topbar-right">
            <span class="status-text">
                <span class="status-dot" id="status-dot"></span>
                <span id="status-text">就绪</span>
            </span>
            <button class="history-btn" id="history-btn" onclick="toggleHistory()">📋 历史</button>
            <button class="ctrl-btn" id="ctrl-btn">
                <span class="ctrl-btn-icon" id="ctrl-icon">▶</span>
                <span id="ctrl-label">开始翻译</span>
            </button>
        </div>
    </div>

    <!-- ═══ 视频区域（翻译开始后显示） ═══ -->
    <div class="video-stage" id="video-stage">
        <video id="video-player" autoplay playsinline></video>

        <!-- 历史字幕（淡出消失） -->

        <!-- 字幕覆盖层（可拖拽 + 毛玻璃） -->
        <div class="subtitle-overlay" id="subtitle-overlay">
            <div class="subtitle-target" id="sub-target"></div>
        </div>
    </div>

    <!-- ═══ 空状态（未开始时） ═══ -->
    <div class="guide" id="guide">
        <div class="guide-icon">
            <svg width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/><path d="M7 8l3 3-3 3"/><line x1="13" y1="14" x2="17" y2="14"/></svg>
        </div>
        <h2 class="guide-title">AI 同声传译助手</h2>
        <p class="guide-desc">
            点击「开始翻译」→ 选择正在播放视频的浏览器标签页。
            视频会搬到这个页面，字幕自动浮在视频上方。
        </p>
        <div class="steps">
            <div class="step"><span class="step-num">1</span><span>在另一个标签页打开外语视频</span></div>
            <div class="step"><span class="step-num">2</span><span>点击「开始翻译」→ 选择视频标签页</span></div>
            <div class="step"><span class="step-num">3</span><span>视频搬到此页面，字幕自动显示</span></div>
        </div>
        <div class="lang-selector">
            <label class="lang-label">源语言</label>
            <select id="source-lang" class="lang-dropdown">
                <option value="en">English 英语</option>
                <option value="ja">日本語 日语</option>
                <option value="ko">한국어 韩语</option>
                <option value="fr">Français 法语</option>
                <option value="de">Deutsch 德语</option>
                <option value="es">Español 西班牙语</option>
            </select>
        </div>
    </div>

    <!-- ═══ 底部信息栏 ═══ -->
    <div class="bottombar">
        <span>Powered by 阿里云百炼 LiveTranslate</span>
        <span>v0.4.0</span>
    </div>

    <!-- ═══ 历史记录面板 ═══ -->
    <div class="history-panel" id="history-panel">
        <div class="history-header">
            <h3>翻译记录</h3>
            <div class="history-actions">
                <button onclick="toggleSelectAll()">全选</button>
                <button onclick="exportSelected()" class="btn-primary">导出</button>
                <button onclick="clearHistory()" class="btn-danger">清空</button>
                <button onclick="toggleHistory()">✕</button>
            </div>
        </div>
        <div class="history-list" id="history-list">
            <div class="history-empty">暂无翻译记录</div>
        </div>
    </div>

</div>

<script src="/static/app.js"></script>
</body>
</html>
