<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimulCast — AI 同声传译助手</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
<div class="aurora-bg">
    <div class="aurora-blob aurora-blob-1"></div>
    <div class="aurora-blob aurora-blob-2"></div>
    <div class="aurora-blob aurora-blob-3"></div>
</div>
<canvas id="wave-canvas"></canvas>
<canvas id="particle-canvas"></canvas>
<div class="app">

    <!-- ═══ 顶部控制栏（翻译前简化） ═══ -->
    <div class="topbar" id="topbar">
        <div class="topbar-left">
            <span class="brand-dot" id="brand-dot"></span>
            <span class="brand-name">SimulCast</span>
            <span class="brand-badge">AI 同声传译</span>
        </div>
        <div class="topbar-right">
            <button class="history-btn" id="history-btn" onclick="toggleHistory()">📋 历史</button>
            <span class="status-text" id="status-area">
                <span class="status-dot" id="status-dot"></span>
                <span id="status-text">就绪</span>
            </span>
            <button class="ctrl-btn" id="ctrl-btn">
                <span class="ctrl-btn-icon" id="ctrl-icon">⏹</span>
                <span id="ctrl-label">停止翻译</span>
            </button>
        </div>
    </div>

    <!-- ═══ 视频区域（翻译开始后显示） ═══ -->
    <div class="video-stage" id="video-stage">
        <video id="video-player" autoplay playsinline></video>

        <!-- 本地视频控制条 -->
        <div class="video-controls" id="video-controls">
            <button class="vc-btn" id="vc-play" title="播放/暂停">⏸</button>
            <div class="vc-progress-wrap" id="vc-progress-wrap">
                <div class="vc-progress-bar" id="vc-progress-bar"></div>
            </div>
            <span class="vc-time" id="vc-time">0:00 / 0:00</span>
            <button class="vc-btn" id="vc-mute" title="静音">🔊</button>
        </div>

        <!-- 字幕覆盖层（可拖拽 + 毛玻璃） -->
        <div class="subtitle-overlay" id="subtitle-overlay">
            <div class="subtitle-target" id="sub-target"></div>
        </div>
    </div>

    <!-- ═══ 空状态（未开始时） ═══ -->
    <div class="guide" id="guide">
        <div class="brand-hero">
            <h1 class="brand-logo">SimulCast</h1>
            <p class="brand-tagline">AI 同声传译助手</p>
            <p class="brand-desc">实时翻译外语视频，自动生成中文字幕</p>
        </div>
        <div class="guide-content">
            <button class="start-btn" id="start-btn">
                <span class="start-btn-icon">▶</span>
                <span>开始翻译</span>
            </button>
            <div class="local-file-section">
                <label class="local-file-btn" for="local-file-input">
                    <span class="local-file-icon">📂</span>
                    <span>打开本地视频文件</span>
                </label>
                <input type="file" id="local-file-input" accept="video/*,audio/*" style="display:none">
                <span class="local-file-hint" id="local-file-name"></span>
            </div>
            <div class="share-hints">
                <div class="share-hint">
                    <span class="share-hint-icon">🌐</span>
                    <span>在线视频：直接点「开始翻译」，选择标签页共享</span>
                </div>
                <div class="share-hint">
                    <span class="share-hint-icon">📁</span>
                    <span>本地视频：先选择文件，再点「开始翻译」</span>
                </div>
            </div>
            <div class="lang-selector">
                <label class="lang-label">源语言</label>
                <select id="source-lang" class="lang-dropdown">
                    <option value="en">English 英语</option>
                    <option value="ja">日本語 日语</option>
                    <option value="ko">한국어 韩语</option>
                    <option value="fr">Français 法语</option>
                    <option value="de">Deutsch 德语</option>
                    <option value="es">Español 西班牙语</option>
                </select>
            </div>
            <p class="guide-hint">选择正在播放视频的浏览器标签页，视频会搬到这个页面</p>
        </div>
    </div>

    <!-- ═══ 底部信息栏 ═══ -->
    <div class="bottombar">
        <span>Powered by 阿里云百炼 LiveTranslate</span>
        <span>v0.4.0</span>
    </div>

    <!-- ═══ 历史记录面板 ═══ -->
    <div class="history-panel" id="history-panel">
        <div class="history-header">
            <h3>翻译记录</h3>
            <div class="history-actions">
                <button onclick="toggleSelectAll()">全选</button>
                <button onclick="exportSelected()" class="btn-primary">导出</button>
                <button onclick="clearHistory()" class="btn-danger">清空</button>
                <button onclick="toggleHistory()">✕</button>
            </div>
        </div>
        <div class="history-list" id="history-list">
            <div class="history-empty">暂无翻译记录</div>
        </div>
    </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
