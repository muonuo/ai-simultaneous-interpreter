<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SimulCast — AI 同声传译助手</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <!-- 顶部 -->
        <header class="header">
            <div class="brand">
                <span class="brand-dot"></span>
                <h1>SimulCast</h1>
                <span class="brand-badge">AI 同声传译</span>
            </div>
            <div class="header-actions">
                <a href="https://github.com/muonuo/ai-simultaneous-interpreter" target="_blank" class="gh-link" title="GitHub">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                </a>
            </div>
        </header>

        <!-- 主内容 -->
        <main class="main-content">
            <!-- 状态卡片 -->
            <div class="status-card" id="status-card">
                <div class="status-icon" id="status-icon">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
                </div>
                <h2 id="status-title">准备开始</h2>
                <p id="status-desc">在任何网站观看英文视频时，打开本页面并点击下方按钮。选择视频所在的浏览器标签页，实时字幕将以浮动窗口形式显示在屏幕上方。</p>
            </div>

            <!-- 主控按钮 -->
            <div class="action-area">
                <button class="main-btn" id="main-btn">
                    <span class="main-btn-icon">&#9654;</span>
                    <span class="main-btn-text">开始翻译</span>
                </button>
                <p class="hint" id="hint">选择正在播放视频的浏览器标签页</p>
            </div>

            <!-- 设置 -->
            <div class="settings-row">
                <div class="setting-group">
                    <label>字体</label>
                    <div class="toggle-group" id="font-group">
                        <button class="toggle-btn active" data-font="medium">中</button>
                        <button class="toggle-btn" data-font="large">大</button>
                    </div>
                </div>
                <div class="setting-group">
                    <label>模式</label>
                    <div class="toggle-group" id="mode-group">
                        <button class="toggle-btn active" data-mode="bottom">底部</button>
                        <button class="toggle-btn" data-mode="overlay">叠加</button>
                    </div>
                </div>
                <div class="setting-group">
                    <label>目标语言</label>
                    <select id="lang-select">
                        <option value="zh">中文</option>
                        <option value="ja">日本語</option>
                        <option value="ko">한국어</option>
                    </select>
                </div>
            </div>

            <!-- 本地文件上传 -->
            <div class="local-file-card">
                <div class="local-file-icon">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                </div>
                <div class="local-file-text">
                    <strong>本地文件翻译</strong>
                    <span>上传电脑上的视频或音频文件，直接获取翻译字幕</span>
                </div>
                <div class="local-file-action">
                    <input type="file" id="file-input" accept="video/*,audio/*">
                </div>
            </div>

            <!-- 底部状态栏 -->
            <div class="info-bar">
                <span class="info-dot" id="info-dot"></span>
                <span id="info-text">就绪</span>
                <span class="info-spacer"></span>
                <span class="info-version">v0.1.0 · Powered by 七牛云 AI</span>
            </div>

            <!-- 内联字幕（降级方案，默认隐藏） -->
            <div class="inline-subtitles" id="inline-subtitles" style="display:none;">
                <div class="inline-row">
                    <span class="inline-tag tag-en">EN</span>
                    <div class="inline-text" id="inline-en">等待语音输入...</div>
                </div>
                <div class="inline-row">
                    <span class="inline-tag tag-zh">中</span>
                    <div class="inline-text" id="inline-zh">翻译将在此显示</div>
                </div>
            </div>

        </main>
    </div>

    <script src="/static/app.js"></script>
</body>
</html>
