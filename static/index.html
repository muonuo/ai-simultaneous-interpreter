<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 同声传译助手 — SimulCast</title>
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&family=Noto+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="topbar" id="topbar">
        <div class="brand">
            <span class="brand-icon">&#9670;</span>
            <span class="brand-text">SimulCast</span>
        </div>
        <div class="topbar-actions">
            <button class="icon-btn" id="theme-toggle" title="切换主题" aria-label="切换主题">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
            </button>
            <a href="https://github.com/muonuo/ai-simultaneous-interpreter" target="_blank" class="icon-btn" title="GitHub" aria-label="GitHub">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
            </a>
        </div>
    </nav>

    <!-- 侧边栏 - 设置面板 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-section">
            <label class="sidebar-label">字体大小</label>
            <div class="btn-group">
                <button class="btn-sm active" data-font="medium">中</button>
                <button class="btn-sm" data-font="large">大</button>
                <button class="btn-sm" data-font="xlarge">特大</button>
            </div>
        </div>
        <div class="sidebar-section">
            <label class="sidebar-label">字幕位置</label>
            <div class="btn-group">
                <button class="btn-sm active" data-position="bottom">底部</button>
                <button class="btn-sm" data-position="overlay">叠加</button>
            </div>
        </div>
        <div class="sidebar-section">
            <label class="sidebar-label">语言</label>
            <select class="select-sm" id="target-lang">
                <option value="zh">中文</option>
                <option value="en">English</option>
                <option value="ja">日本語</option>
                <option value="ko">한국어</option>
            </select>
        </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main" id="main-content">
        <!-- 视频 / 空状态 -->
        <section class="stage" id="stage">
            <div class="stage-inner" id="video-container">
                <!-- 空状态 -->
                <div class="empty-state" id="empty-state">
                    <div class="empty-icon">
                        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
                    </div>
                    <h2 class="empty-title">准备开始翻译</h2>
                    <p class="empty-desc">粘贴视频链接或上传本地文件，开启实时同声传译</p>
                    <div class="empty-actions">
                        <button class="btn btn-primary" id="empty-link-btn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                            粘贴链接
                        </button>
                        <button class="btn btn-secondary" id="empty-file-btn">
                            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg>
                            上传文件
                        </button>
                    </div>
                </div>
                <!-- 视频/音频元素由 JS 动态插入 -->
            </div>

            <!-- URL 输入栏（视频加载后隐藏） -->
            <div class="url-bar" id="url-bar">
                <div class="url-input-wrapper">
                    <svg class="url-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                    <input type="text" id="video-url" placeholder="粘贴 YouTube / 视频链接后按 Enter..." autocomplete="off">
                    <span class="url-divider">|</span>
                    <label class="file-upload-label" title="上传文件">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                    </label>
                    <input type="file" id="file-input" accept="video/*,audio/*" hidden>
                </div>
            </div>
        </section>

        <!-- 翻译控制栏 -->
        <div class="control-bar" id="control-bar">
            <button class="control-btn primary" id="start-btn" disabled>
                <span class="control-btn-icon">&#9654;</span>
                <span class="control-btn-text">开始翻译</span>
            </button>
            <button class="control-btn" id="pause-btn" disabled>
                <span class="control-btn-icon">&#10074;&#10074;</span>
            </button>
            <div class="control-divider"></div>
            <div class="status-indicator" id="status-indicator">
                <span class="status-dot"></span>
                <span class="status-text">就绪</span>
            </div>
            <div class="control-spacer"></div>
            <button class="control-btn" id="export-btn" disabled>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                <span class="control-btn-text">导出</span>
            </button>
            <button class="control-btn" id="settings-toggle">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
            </button>
        </div>

        <!-- 字幕展示区 -->
        <section class="subtitles" id="subtitles">
            <div class="subtitle-track" id="subtitle-track">
                <!-- 英文字幕行 -->
                <div class="subtitle-line en-line" id="en-line">
                    <span class="subtitle-label">EN</span>
                    <div class="subtitle-segments" id="en-segments">
                        <span class="subtitle-placeholder">等待语音输入...</span>
                    </div>
                </div>
                <!-- 中文字幕行 -->
                <div class="subtitle-line zh-line" id="zh-line">
                    <span class="subtitle-label">中</span>
                    <div class="subtitle-segments" id="zh-segments">
                        <span class="subtitle-placeholder">翻译将在此显示</span>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Toast 通知 -->
    <div class="toast-container" id="toast-container"></div>

    <script src="/static/app.js"></script>
</body>
</html>
